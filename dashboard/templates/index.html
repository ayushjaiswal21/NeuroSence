<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>EdgeMind Live Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --danger: #ef4444;
            --success: #10b981;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            background-image: radial-gradient(circle at top right, #1e293b 0%, transparent 60%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        main {
            width: 90%;
            max-width: 1000px;
            margin-top: 50px;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: -webkit-linear-gradient(#38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .status-banner {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 40px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .status-banner.alert {
            background: rgba(239, 68, 68, 0.2);
            border-color: var(--danger);
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.3);
        }
        .status-banner h2 {
            margin: 0;
            font-size: 2rem;
            transition: color 0.3s;
        }
        .status-banner.alert h2 { color: var(--danger); }
        .status-banner.normal h2 { color: var(--success); }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 30px 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .card h3 {
            margin: 0 0 10px 0;
            font-size: 1.1rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .value {
            font-size: 3rem;
            font-weight: 600;
            color: var(--accent);
        }
        .unit {
            font-size: 1rem;
            color: var(--text-secondary);
        }
        .timestamp {
            margin-top: 40px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <main>
        <header>
            <h1>EdgeMind Dashboard</h1>
            <p>Real-Time Cognitive Load & Stress Monitor</p>
        </header>

        <div class="status-banner" id="statusBanner">
            <h2 id="statusText">Awaiting Data...</h2>
        </div>

        <div class="grid">
            <div class="card">
                <h3>Heart Rate</h3>
                <div class="value"><span id="hrValue">--</span><span class="unit"> bpm</span></div>
            </div>
            <div class="card">
                <h3>HRV (RMSSD)</h3>
                <div class="value"><span id="rmssdValue">--</span><span class="unit"> ms</span></div>
            </div>
            <div class="card">
                <h3>GSR</h3>
                <div class="value"><span id="gsrValue">--</span><span class="unit"> V</span></div>
            </div>
        </div>
        
        <div class="timestamp" id="timestampText">Last Updated: --</div>
    </main>

    <script>
        async function fetchData() {
            try {
                const res = await fetch('/api/data');
                const data = await res.json();
                
                document.getElementById('hrValue').innerText = data.hr;
                document.getElementById('rmssdValue').innerText = (data.rmssd).toFixed(2);
                document.getElementById('gsrValue').innerText = (data.gsr).toFixed(2);
                document.getElementById('timestampText').innerText = "Last Updated: " + data.timestamp;

                const banner = document.getElementById('statusBanner');
                const sText = document.getElementById('statusText');

                if (data.stress_alert) {
                    banner.className = 'status-banner alert';
                    sText.innerText = 'HIGH COGNITIVE STRESS DETECTED';
                } else if (data.timestamp !== "No data yet") {
                    banner.className = 'status-banner normal';
                    sText.innerText = 'Normal / Baseline';
                }
            } catch (err) {
                console.error("Failed to fetch data", err);
            }
        }
        setInterval(fetchData, 2000); // Poll every 2 seconds
        fetchData();
    </script>
</body>
</html>
